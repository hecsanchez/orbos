services:
  - type: web
    name: orbos-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orbos-db
          property: connectionString
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_MODEL
        value: claude-sonnet-4-5
    healthCheckPath: /api

databases:
  - name: orbos-db
    plan: starter
    postgresMajorVersion: "16"
    ipAllowList: []
